<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>EntraForce — Email Signature</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  body { font-family: -apple-system, "Segoe UI", Arial, sans-serif; background: #f3f3f3; padding: 40px; margin: 0; }
  .preview-card { background: #fff; max-width: 760px; margin: 0 auto; padding: 40px; border-radius: 8px; box-shadow: 0 4px 24px rgba(0,0,0,0.06); }
  .preview-label { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 24px; }
  .greeting { font-family: Arial, sans-serif; font-size: 14px; color: #1a1a1a; margin-bottom: 28px; }
</style>
</head>
<body>

<div class="preview-card">
  <div class="preview-label">Preview — what recipients will see</div>
  <div class="greeting">Best Regards,</div>

  <!-- ============================================== -->
  <!-- COPY EVERYTHING BETWEEN THESE COMMENTS INTO GMAIL -->
  <!-- ============================================== -->

  <table cellpadding="0" cellspacing="0" border="0" bgcolor="#080d1a" style="background-color: #080d1a; border-collapse: collapse; border: 1px solid rgba(200, 168, 75, 0.35); border-radius: 6px;">
    <tr>
      <td style="padding: 24px 28px;">

        <!-- TOP: Logo + Identity -->
        <table cellpadding="0" cellspacing="0" border="0" style="border-collapse: collapse;">
          <tr>
            <td valign="middle" style="padding-right: 20px;">
              <!-- PREVIEW uses relative path. Before pasting into Gmail, swap to: https://entraforce.com/assets/ef-logo-signature.png -->
              <img src="ef-logo-signature.png" width="80" height="80" alt="EntraForce Logo" style="display: block; border: 1px solid rgba(200, 168, 75, 0.4); border-radius: 50%;">
            </td>
            <td valign="middle">
              <div style="font-family: 'Manrope', 'Helvetica Neue', Arial, sans-serif; font-size: 20px; font-weight: 800; color: #ffffff; letter-spacing: 0.4px; line-height: 1.1;">Osman Mohammed</div>
              <div style="font-family: 'Manrope', 'Helvetica Neue', Arial, sans-serif; font-size: 12px; font-weight: 500; color: #c8a84b; margin-top: 6px; letter-spacing: 1.5px; text-transform: uppercase;">Founder &middot; EntraForce</div>
              <div style="font-family: Georgia, 'Times New Roman', serif; font-size: 13px; color: #b8b8b8; font-style: italic; margin-top: 8px; line-height: 1.4;">End-to-End Tech Solutions</div>
            </td>
          </tr>
        </table>

        <!-- Gold divider -->
        <table cellpadding="0" cellspacing="0" border="0" width="100%" style="margin-top: 20px; margin-bottom: 20px;">
          <tr>
            <td height="1" bgcolor="#c8a84b" style="background-color: #c8a84b; line-height: 1px; font-size: 1px; opacity: 0.5;">&nbsp;</td>
          </tr>
        </table>

        <!-- MIDDLE: Contact info with CTA inlined on the LOC row -->
        <table cellpadding="0" cellspacing="0" border="0" width="100%" style="border-collapse: collapse; font-family: 'Manrope', 'Helvetica Neue', Arial, sans-serif; font-size: 13px; color: #e5e5e5;">
          <tr>
            <td colspan="2" style="padding-bottom: 8px;">
              <span style="color: #c8a84b; font-weight: 700; margin-right: 8px; font-size: 11px; letter-spacing: 1px;">DFW</span>
              <a href="tel:+19452083795" style="color: #e5e5e5; text-decoration: none;">(945) 208-3795</a>
              <span style="color: rgba(200, 168, 75, 0.4); padding: 0 12px;">|</span>
              <span style="color: #c8a84b; font-weight: 700; margin-right: 8px; font-size: 11px; letter-spacing: 1px;">CHI</span>
              <a href="tel:+18478096991" style="color: #e5e5e5; text-decoration: none;">(847) 809-6991</a>
            </td>
          </tr>
          <tr>
            <td colspan="2" style="padding-bottom: 8px;">
              <span style="color: #c8a84b; font-weight: 700; margin-right: 8px; font-size: 11px; letter-spacing: 1px;">EML</span>
              <a href="mailto:osman@entraforce.com" style="color: #e5e5e5; text-decoration: none;">osman@entraforce.com</a>
            </td>
          </tr>
          <tr>
            <td colspan="2" style="padding-bottom: 8px;">
              <span style="color: #c8a84b; font-weight: 700; margin-right: 8px; font-size: 11px; letter-spacing: 1px;">LOC</span>
              <span style="color: #b8b8b8;">DFW &amp; Chicagoland</span>
            </td>
          </tr>
          <tr>
            <td valign="middle">
              <span style="color: #c8a84b; font-weight: 700; margin-right: 8px; font-size: 11px; letter-spacing: 1px;">WEB</span>
              <a href="https://entraforce.com" style="color: #e5e5e5; text-decoration: none;">entraforce.com</a>
            </td>
            <td align="right" valign="middle">
              <table cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td bgcolor="#c8a84b" style="background-color: #c8a84b; border-radius: 4px;">
                    <a href="https://calendly.com/entraforce" style="display: inline-block; padding: 8px 18px; font-family: 'Manrope', 'Helvetica Neue', Arial, sans-serif; font-size: 11px; font-weight: 800; color: #080d1a; text-decoration: none; letter-spacing: 1.2px; text-transform: uppercase; line-height: 1.4;">Let's Talk &rarr;</a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
        </table>

      </td>
    </tr>
  </table>

  <!-- ============================================== -->
  <!-- END OF SIGNATURE -->
  <!-- ============================================== -->

</div>

</body>
</html>
